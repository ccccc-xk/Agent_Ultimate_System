# Agent Ultimate System - Render Blueprint
# Deploy all backend services to Render
# Usage: Connect your GitHub repo to Render and use this blueprint

databases:
  # MySQL-compatible PostgreSQL database
  - name: agent-mysql
    databaseName: enterprise_base
    plan: free
    ipAllowList: []

services:
  # P01 - Enterprise Management Backend
  - type: web
    name: p01-enterprise-backend
    runtime: java
    plan: free
    buildCommand: cd "01_企业管理基座系统/backend" && mvn clean package -DskipTests
    startCommand: cd "01_企业管理基座系统/backend" && java -jar target/enterprise-base-1.0.0.jar
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        fromDatabase:
          name: agent-mysql
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: agent-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: agent-mysql
          property: password
      - key: AI_API_KEY
        sync: false
      - key: AI_API_URL
        value: https://api.deepseek.com/v1/chat/completions
      - key: AI_MODEL
        value: deepseek-chat
      - key: JWT_SECRET
        generateValue: true
    autoDeploy: false

  # P02 - Logistics Intelligence Backend
  - type: web
    name: p02-logistics-backend
    runtime: java
    plan: free
    buildCommand: cd "02_政企物流智能化转化/backend" && mvn clean package -DskipTests
    startCommand: cd "02_政企物流智能化转化/backend" && java -jar target/smart-logistics-1.0.0.jar
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        fromDatabase:
          name: agent-mysql
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: agent-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: agent-mysql
          property: password
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
    autoDeploy: false

  # P04 - Medical RAG Backend
  - type: web
    name: p04-medical-rag
    runtime: python
    plan: starter
    buildCommand: cd "04_医疗智能问诊基础RAG/backend" && pip install -r requirements.txt
    startCommand: cd "04_医疗智能问诊基础RAG/backend" && uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL_NAME
        value: deepseek-chat
      - key: MILVUS_HOST
        sync: false
      - key: MILVUS_PORT
        value: "19530"
      - key: EMBEDDING_MODEL_PATH
        value: BAAI/bge-large-zh-v1.5
      - key: ALLOWED_ORIGINS
        value: "*"
    autoDeploy: false
