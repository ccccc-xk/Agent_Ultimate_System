server:
  port: ${PORT:9002}

spring:
  application:
    name: smart-logistics

  datasource:
    url: jdbc:postgresql://${DB_HOST:dpg-d8n7tncm0tmc73dr44n0-a.oregon-postgres.render.com}:${DB_PORT:5432}/${DB_NAME:smart_logistics}
    username: ${DB_USERNAME:agent_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

langchain4j:
  open-ai:
    chat-model:
      api-key: ${LLM_API_KEY:tp-c0r0k8zxpuchf6ce2q4fh3hsvjzss58rz0e28dp6khyvcjhy}
      base-url: ${LLM_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
      model-name: ${LLM_MODEL:mimo-v2.5-pro}
      temperature: 0.1
      max-tokens: 2000
      timeout: PT60S

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.logistics.smart: info
    dev.langchain4j: info
